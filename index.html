</style></head><body><div class="container"><div class="header"><h1>🇪🇺 欧洲移民项目综合评估</h1><p>葡萄牙/西班牙/希腊/马耳他/荷兰/法国/德国 · 一次评估多国项目</p></div><form id="qform">
<div class="card"><h2><span class="num">1</span> 基本信息</h2><div class="fg"><label class="q">年龄</label><select id="age"><option value="">请选择</option><option value="18-35">18-35岁</option><option value="36-45">36-45岁</option><option value="46-55">46-55岁</option><option value="56+">56岁以上</option></select></div><div class="fg"><label class="q">国籍/身份</label><select id="nationality"><option value="">请选择</option><option value="cn">中国内地</option><option value="hkmo">港澳</option><option value="tw">台湾</option><option value="other">其他</option></select></div><div class="fg"><label class="q">是否有无犯罪记录<span class="hint">（是=无犯罪记录）</span></label><div class="radio-row"><label class="ropt"><input type="radio" name="nocrim" value="yes"> 是</label><label class="ropt"><input type="radio" name="nocrim" value="no"> 否</label></div></div><div class="fg"><label class="q">是否有健康证明/可通过体检</label><div class="radio-row"><label class="ropt"><input type="radio" name="health" value="yes"> 是</label><label class="ropt"><input type="radio" name="health" value="no"> 否</label></div></div></div>
<div class="card"><h2><span class="num">2</span> 资金与收入</h2><div class="fg"><label class="q">可用于投资/移民的资金（欧元）</label><select id="capital"><option value="">请选择</option><option value="lt100k">低于€10万</option><option value="100k-250k">€10万-25万</option><option value="250k-500k">€25万-50万</option><option value="500k-1m">€50万-100万</option><option value="gte1m">€100万以上</option></select></div><div class="fg"><label class="q">月收入类型</label><select id="income_type"><option value="">请选择</option><option value="passive">被动收入：租金/股息/养老金</option><option value="remote">远程工作/自由职业境外收入</option><option value="salary">雇主工资收入</option><option value="business">企业经营收入</option><option value="none">暂无稳定收入</option></select></div><div class="fg"><label class="q">月收入水平（欧元）</label><select id="monthly_income"><option value="">请选择</option><option value="lt1k">低于€1,000</option><option value="1k-3k">€1,000-3,000</option><option value="3k-5k">€3,000-5,000</option><option value="5k-10k">€5,000-10,000</option><option value="gte10k">€10,000以上</option></select></div><div class="fg"><label class="q">资金来源是否可合法解释？</label><div class="radio-row"><label class="ropt"><input type="radio" name="fundsource" value="yes"> 是</label><label class="ropt"><input type="radio" name="fundsource" value="partial"> 部分</label><label class="ropt"><input type="radio" name="fundsource" value="no"> 否</label></div></div></div>
<div class="card"><h2><span class="num">3</span> 工作/创业/派遣</h2><div class="fg"><label class="q">是否已有欧洲雇主offer？</label><div class="radio-row"><label class="ropt"><input type="radio" name="eu_offer" value="yes"> 是</label><label class="ropt"><input type="radio" name="eu_offer" value="neg"> 洽谈中</label><label class="ropt"><input type="radio" name="eu_offer" value="no"> 否</label></div></div><div class="fg"><label class="q">学历/专业背景</label><select id="education"><option value="">请选择</option><option value="phd">博士/科研</option><option value="master">硕士</option><option value="bachelor">本科</option><option value="vocational">职业资格/技工</option><option value="none">无高等学历</option></select></div><div class="fg"><label class="q">职业方向</label><select id="profession"><option value="">请选择</option><option value="tech">科技/IT/AI/工程</option><option value="medical">医疗/护理/生命科学</option><option value="research">科研/高校</option><option value="business">企业高管/商务</option><option value="artist">艺术/文化/创作</option><option value="trade">技工/蓝领</option><option value="other">其他</option></select></div><div class="fg"><label class="q">是否有创业/自雇计划？</label><div class="radio-row"><label class="ropt"><input type="radio" name="startup" value="yes"> 是</label><label class="ropt"><input type="radio" name="startup" value="maybe"> 有想法</label><label class="ropt"><input type="radio" name="startup" value="no"> 否</label></div></div><div class="fg"><label class="q">是否有跨国公司派遣/欧洲分支/客户项目可能？</label><div class="radio-row"><label class="ropt"><input type="radio" name="ict" value="yes"> 是</label><label class="ropt"><input type="radio" name="ict" value="maybe"> 洽谈中</label><label class="ropt"><input type="radio" name="ict" value="no"> 否</label></div></div></div>
<div class="card"><h2><span class="num">4</span> 居住偏好与目标</h2><div class="fg"><label class="q">能接受的居住要求</label><select id="residence"><option value="">请选择</option><option value="low">低居住要求（每年几天/无移民监）</option><option value="medium">每年3-6个月</option><option value="full">愿意长期居住</option></select></div><div class="fg"><label class="q">是否希望在当地工作？</label><div class="radio-row"><label class="ropt"><input type="radio" name="local_work" value="yes"> 是</label><label class="ropt"><input type="radio" name="local_work" value="no"> 否</label></div></div><div class="fg"><label class="q">主要目标<span class="hint">（可多选）</span></label><div class="radio-row"><label class="ropt"><input type="checkbox" name="purpose" value="lowstay"> 低居住</label><label class="ropt"><input type="checkbox" name="purpose" value="work"> 工作</label><label class="ropt"><input type="checkbox" name="purpose" value="business"> 创业</label><label class="ropt"><input type="checkbox" name="purpose" value="edu"> 子女教育</label><label class="ropt"><input type="checkbox" name="purpose" value="tax"> 税务/资产</label><label class="ropt"><input type="checkbox" name="purpose" value="passport"> 入籍/护照</label></div></div><div class="fg"><label class="q">优先国家<span class="hint">（可选）</span></label><select id="prefer"><option value="">无特别偏好</option><option value="pt">葡萄牙</option><option value="es">西班牙</option><option value="gr">希腊</option><option value="mt">马耳他</option><option value="nl">荷兰</option><option value="fr">法国</option><option value="de">德国</option></select></div></div>
<div class="card"><h2><span class="num">5</span> 家庭情况</h2><div class="fg"><label class="q">是否需要配偶/子女随行？</label><div class="radio-row"><label class="ropt"><input type="radio" name="family" value="yes"> 是</label><label class="ropt"><input type="radio" name="family" value="no"> 否</label></div></div><div class="fg"><label class="q">时间紧迫程度</label><select id="urgency"><option value="">请选择</option><option value="urgent">6个月内明确方案</option><option value="normal">6-12个月</option><option value="flexible">1年以上</option></select></div></div>
<button type="button" class="btn" onclick="submitForm()">📊 提交评估</button></form><div class="results-wrap" id="results"></div></div><script>
(function(){var D=document;function R(n){var e=D.querySelector('input[name="'+n+'"]:checked');return e?e.value:null}function S(id){var e=D.getElementById(id);return e?e.value:''}function CB(n){var a=[];D.querySelectorAll('input[name="'+n+'"]:checked').forEach(function(e){a.push(e.value)});return a}function selectOption(l){var i=l.querySelector('input');if(!i)return;if(i.type==='radio'){i.checked=true;var r=l.closest('.radio-row');if(r)r.querySelectorAll('.ropt').forEach(function(x){x.classList.remove('sel')});l.classList.add('sel')}else{i.checked=!i.checked;l.classList.toggle('sel',i.checked)}}D.querySelectorAll('.ropt').forEach(function(l){l.addEventListener('touchstart',function(e){selectOption(this);e.preventDefault()},{passive:false});l.addEventListener('mousedown',function(e){selectOption(this);e.preventDefault()})});window.goBack=function(){D.getElementById('results').classList.remove('show');D.getElementById('qform').style.display='';setTimeout(function(){D.getElementById('qform').scrollIntoView({behavior:'smooth'})},50)};window.onProjectCheck=function(){};
window.goExecPlan=function(){
  var checks=document.querySelectorAll('input[name="selProject"]:checked');
  if(checks.length===0){alert('请至少选择一个通过评估的项目');return;}
  var projects=Array.from(checks).map(function(c){return c.value;});
  var u=new URL(window.location.href);
  var batch=u.searchParams.get('batch')||'';
  var issue=u.searchParams.get('issue')||'';
  if(batch==='1'&&issue){
    try{var bd=JSON.parse(localStorage.getItem('***')||'{}');bd[issue]=bd[issue]||{};bd[issue]['eu']={projects:projects,ts:Date.now()};localStorage.setItem('***',JSON.stringify(bd));}catch(e){}
    var retUrl=u.searchParams.get('return')||'https://sewen38.github.io/family-plan/?batch=1&issue='+issue;
    window.location.href=retUrl;return;
  }
  window.location.href='https://sewen38.github.io/eu-assessment/exec.html?issue='+issue+'&projects='+projects.join(',');
};window.goPrevStage=function(){
  var u=new URL(window.location.href);
  var ret=u.searchParams.get('return')||'';
  if(ret){window.location.href=ret;return;}
  window.location.href='https://sewen38.github.io/family-plan/?issue='+(u.searchParams.get('issue')||'');
};
var execPageUrl='https://sewen38.github.io/eu-assessment/exec.html';

function add(a,country,project,status,why){a.push({country,project,status,why})}function has(ps,v){return ps.indexOf(v)>=0}
window.submitForm=function(){var x={age:S('age'),nationality:S('nationality'),nocrim:R('nocrim'),health:R('health'),capital:S('capital'),income_type:S('income_type'),monthly_income:S('monthly_income'),fundsource:R('fundsource'),eu_offer:R('eu_offer'),education:S('education'),profession:S('profession'),startup:R('startup'),ict:R('ict'),residence:S('residence'),local_work:R('local_work'),purpose:CB('purpose'),prefer:S('prefer'),family:R('family'),urgency:S('urgency')};var miss=[];['age','nationality','nocrim','health','capital','income_type','monthly_income','fundsource','eu_offer','education','profession','startup','ict','residence','local_work','family','urgency'].forEach(function(k){if(!x[k])miss.push(k)});if(miss.length){alert('请完成未填项：\n'+miss.join('、'));return}var w=D.getElementById('results');D.getElementById('qform').style.display='none';w.innerHTML='<div class="rs-card" style="text-align:center;padding:50px 20px"><div style="font-size:40px">📤</div><h3>已提交</h3><p style="color:#888;font-size:13px"><span class="spinner"></span>正在评估欧洲可做项目...</p></div>';w.classList.add('show');w.scrollIntoView({behavior:'smooth'});setTimeout(function(){showResults(x)},1200)};
function showResults(x){if(x.nocrim==='no'){D.getElementById('results').innerHTML='<div class="rs-card" style="border-left:4px solid #ef4444"><h3>⚠️ 评估结果</h3><p style="color:#991b1b;font-weight:600">可能存在犯罪记录。欧洲各类居留/签证均有品行要求，需先律师评估。</p><button class="btn-sm" onclick="goBack()">✏️ 返回修改</button></div>';return}var ps=x.purpose, r=[];var cap=x.capital, inc=x.monthly_income, it=x.income_type;var highCap=(cap==='500k-1m'||cap==='gte1m'), midCap=(cap==='250k-500k'||highCap), lowCap=(cap==='100k-250k'||midCap);var remote=(it==='remote'&&(inc==='3k-5k'||inc==='5k-10k'||inc==='gte10k'));var passive=(it==='passive'&&(inc!=='lt1k'));var highSalary=(x.eu_offer==='yes'&&(inc==='5k-10k'||inc==='gte10k'));var wantsLow=x.residence==='low'||has(ps,'lowstay');
if(highCap&&wantsLow)add(r,'葡萄牙','D9/ARI投资居留（基金€50万）','q','低居住要求，房产路径已关闭，基金/科研/文化/就业路径可评估。');else if(midCap&&wantsLow)add(r,'葡萄牙','D9/ARI投资居留','m','资金接近或需选择文化捐赠/其他投资，基金路径通常需€50万。');
if(passive)add(r,'葡萄牙','D7被动收入签证','q','有被动收入，适合退休/财务独立，需实际居住和葡萄牙住宿。');
if(remote)add(r,'葡萄牙','D8数字游民签证','q','远程收入达到较高水平，适合远程工作者。');
if(x.startup==='yes'||x.startup==='maybe')add(r,'葡萄牙','D2企业家签证','m','需商业计划、葡税号/银行/住宿和经营执行。');
if(midCap&&wantsLow)add(r,'希腊','黄金签证','q','€25万-80万分区投资，无最低居住要求，适合申根通行和低居住。');
if(highCap&&wantsLow)add(r,'马耳他','MPRP永居','q','购房/租房+政府费用+资产证明，居住要求低，成本和尽调较高。');
if(passive&&x.residence!=='low')add(r,'西班牙','NLV非盈利居留','m','适合被动收入/退休，但通常需每年居住183天且不可工作。');
if(remote)add(r,'西班牙','数字游民签证','q','远程收入路径，可享税务优惠但需核收入来源结构。');
if(highSalary)add(r,'荷兰','Highly Skilled Migrant / EU Blue Card','q','有荷兰/欧盟雇主和高薪时优先；需认可担保雇主或蓝卡条件。');
if(x.startup==='yes'||x.startup==='maybe')add(r,'荷兰','Startup / Self-employed','m','需创新项目、facilitator或自雇评分，审批较严。');
if(x.ict==='yes'||x.ict==='maybe')add(r,'荷兰','ICT公司内部调动','m','适合跨国公司派遣高管/专家/培训生，通常不是直接永居。');
if(highSalary)add(r,'德国','EU Blue Card / Skilled Worker','q','高学历/认可资格+德国雇主+高薪，德国主流工作居留路径。');
if(x.startup==='yes'||x.startup==='maybe')add(r,'德国','Self-employed / Entrepreneur / Freelancer','m','需商业计划、客户/资金、经济利益；适合真实创业或自由职业。');
if(x.ict==='yes'||x.ict==='maybe')add(r,'德国','ICT Card','m','跨国公司内部调动，高管/专家/培训生，临时派遣非直接移民。');
if(x.eu_offer==='no'&&(x.education==='bachelor'||x.education==='master'||x.education==='phd'))add(r,'德国','Opportunity Card机会卡','m','可作为赴德找工作过渡路径，需积分/学历/语言等。');
