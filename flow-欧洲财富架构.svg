  <!-- Key notes -->
  <rect x="80" y="458" width="560" height="48" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="360" y="476" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">⚠️ 多国并行策略：每个身份单独维护+税务居民判定谨慎管理+CRS信息交换覆盖全欧洲</text>
  <text x="360" y="494" text-anchor="middle" font-size="9" fill="#78716c">申根区居留卡不受90/180天限制 | 各国183天规则独立计算 | 避免双重税务居民</text>
</svg>