  <line x1="230" y1="64" x2="90" y2="115" stroke="#003399" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="490" y1="64" x2="630" y2="115" stroke="#003399" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Wealth management hub -->
