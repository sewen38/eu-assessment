<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" width="100%" style="max-width:720px;font-family:system-ui,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#003399"/></marker>
  </defs>
  <rect width="720" height="520" fill="#f8f9ff" rx="14"/>
  <text x="360" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#003399">欧洲多国组合财富架构</text>
