  <!-- Country boxes inside -->
  <rect x="100" y="224" width="120" height="44" rx="8" fill="#fff" stroke="#003399" stroke-width="1"/>
  <text x="160" y="242" text-anchor="middle" font-size="9" font-weight="700" fill="#003399">🇵🇹 葡萄牙居留→永居</text>
  <text x="160" y="258" text-anchor="middle" font-size="8" fill="#6b7280">ARI基金€50万 / 7天/年</text>
  <rect x="235" y="224" width="110" height="44" rx="8" fill="#fff" stroke="#003399" stroke-width="1"/>
  <text x="290" y="242" text-anchor="middle" font-size="9" font-weight="700" fill="#003399">🇬🇷 希腊永居</text>
  <text x="290" y="258" text-anchor="middle" font-size="8" fill="#6b7280">GV €25-80万 / 无居住</text>
  <rect x="360" y="224" width="110" height="44" rx="8" fill="#fff" stroke="#003399" stroke-width="1"/>
  <text x="415" y="242" text-anchor="middle" font-size="9" font-weight="700" fill="#003399">🇲🇹 马耳他永居</text>
  <text x="415" y="258" text-anchor="middle" font-size="8" fill="#6b7280">MPRP 租房/购房</text>
  <rect x="485" y="224" width="135" height="44" rx="8" fill="#fff" stroke="#003399" stroke-width="1"/>
  <text x="552" y="242" text-anchor="middle" font-size="9" font-weight="700" fill="#003399">🇨🇾 塞浦路斯PR</text>
  <text x="552" y="258" text-anchor="middle" font-size="8" fill="#6b7280">€30万购房 / 无居住</text>
  <!-- Arrows down -->
  <line x1="170" y1="280" x2="170" y2="310" stroke="#003399" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="360" y1="280" x2="360" y2="310" stroke="#003399" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="280" x2="520" y2="310" stroke="#003399" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- European assets -->
