## 附录：常见问题FAQ与实施检查清单

### E. 欧洲组合策略FAQ

#### Q1: 为什么推荐组合策略而不是单一国家？

组合策略的核心优势：(1)多国身份互为备份（一国政策变动不影响全局）(2)申根覆盖最大化（各国居留卡均可申根通行）(3)税务居民灵活调度（不在任何一国超183天）(4)不同国家适合不同用途（葡萄牙→入籍+永居；希腊→快速永居；马耳他→英语环境+资产配置）。

#### Q2: 葡萄牙入籍真的变成10年了吗？

是。2026年5月3日葡萄牙总统颁布Decreto n.º 48/XVII修订《葡萄牙国籍法》，将非EU/CPLP公民入籍所需居住时间从5年延长至10年。但需注意：(1)永居仍为5年不变；(2)新法待《共和国日报》公布后正式生效；(3)已提交的程序可能不受影响（总统声明"已提交的程序不应受立法变更影响"）。对于目标为欧盟护照的客户，需重新评估时间表；对于目标为永居+申根通行的客户，5年永居未受影响。

#### Q3: 各国随行子女年龄限制有哪些差异？

| 国家 | 首次随行上限 | 续签后上限 | 备注 |
|---|---|---|---|
| 葡萄牙 | 18岁 | 续签时在校可延至24岁 | 24岁后须独立 |
| 希腊 | 21岁 | 可续3年至24岁 | 24岁后须独立 |
| 马耳他 | 无年龄上限 | 需经济依赖+未婚 | 最友好 |
| 塞浦路斯 | 25岁以下 | 25岁失效 | 25岁后须独立 |
| 匈牙利 | 18岁 | 18岁 | 限制最严 |

子女接近年龄上限的家庭，应优先选择马耳他（无年龄限制）或加速办理葡萄牙/希腊。

#### Q4: 如何避免在各欧洲国家意外触发税务居民？

| 国家 | 税务居民触发（主要标准） | 低居住策略 |
|---|---|---|
| 葡萄牙 | ≥183天/年 或 惯常居所 | 只待7天/年，不租房注册为惯常居所 |
| 希腊 | ≥183天/年 | 不居住/仅短期到访 |
| 马耳他 | ≥183天/年 或 惯常居所 | 不居住 |
| 塞浦路斯 | ≥183天/年 或 60天规则 | 不居住 |
| 匈牙利 | ≥183天/年 或 重要利益中心 | 不居住 |

**关键原则**：所有选择低居住路径的客户，务必不要在任何欧洲国家居住≥183天/年，否则触发当地税务居民身份+全球征税义务。

#### Q5: ⚠️ 西班牙黄金签证已关闭，有什么替代方案？

西班牙黄金签证已于2025年4月3日正式关闭（《组织法1/2025》）。替代方案：(1)西班牙非盈利居留(NLV)，需居住≥183天/年+被动收入≥€28,800/年，但严格禁止工作；(2)西班牙数字游民签证(DNV)，需€2,849/月远程收入+至少80%收入来自境外+可申请24%固定税率；(3)直接换选葡萄牙D9/ARI（政策最稳定、欧洲投资居留标杆）。

#### Q6: 三国组合（葡+希+马）同时办理冲突吗？

不会冲突。三国的移民体系完全独立运作。但需注意管理要点：(1)资金独立——需有独立资金覆盖每个国家的投资；(2)公证文件——部分可共享（如出生/婚姻公证），部分需单独准备；(3)时间线统筹——各国审批时间不同（葡萄牙6-9月、希腊5-7月、马耳他12-18月），需安排专人统一协调；(4)续签管理——每个国家有独立的续签节点，需建立统一管理表。

#### Q7: 持欧洲居留卡能在申根区停留多久？

持任一申根国签发的有效居留卡：(1)在签发国无时间限制（有效期内可无限期逗留）；(2)在其他申根国：90天/任意180天（与短期申根签证规则一致）；(3)持有多个申根国居留卡可大幅提升行动自由度——可在每个签发国无限期逗留。

#### Q8: 哪个国家教育最友好？

(1)**马耳他**：全英语教学从小学至大学、英式教育体系、国际学校€6,000-10,000/年、欧盟最佳英语环境。(2)**葡萄牙**：国际学校多、学费€6,000-18,000/年、IB/美式/英式课程齐全。(3)**希腊**：国际学校性价比高（€7,000-13,000/年）、ACS Athens/Campion等知名学校。(4)**塞浦路斯**：英语普及率极高、英式法律体系、国际学校€5,000-10,000/年。

#### Q10: 拿到欧洲永居/入籍后，能不能在中国正常生活？

**永居**：不影响中国国籍和户籍。在中国出入境使用中国护照，境内使用中国身份证/户口本。**入籍**：根据《中华人民共和国国籍法》第9条，取得外国国籍后自动丧失中国国籍。实务中如不在中国出入境使用欧洲护照、不主动申报入籍事实，可能处于"隐性状态"——⚠️ 这是法律灰色地带，本方案不做任何"安全"或"永远不会被发现"的承诺。所有客户必须充分理解中国不承认双重国籍的法律风险。

### H. 申根区90/180天规则详解

| 维度 | 规则说明 |
|---|---|
| 适用对象 | 持有C类短期申根签证或享有免签待遇的非EU公民 |
| 核心规则 | 在任何180天滚动窗口内，在申根区累计停留≤90天 |
| 计算方式 | 以任意一天为基准回溯180天，计算期间内累计停留天数 |
| 居留卡持有者 | 签发国无限制；其他申根国适用90/180天 |

var md="# 欧洲组合移民执行策划案\n\n> 生成日期：2026-06-08\n> 适用对象：拟通过欧洲投资居留/永居/入籍路径取得欧盟身份的中国家庭/企业主\n> 文档版本：客户交付版 V1.0（组合方案版）\n> 重要声明：本策划案为商业规划与执行框架，不构成法律、税务、投资或移民建议；落地前须由目标国持牌律师进行最终确认。欧洲各国移民政策持续调整，所有信息须在正式签约前完成最新政策核验。\n\n---\n\n## ⚠️ 组合方案特殊性提醒\n\n**本方案与单一国家方案有本质区别：EU是组合方案**，覆盖多个欧洲国家（🇵🇹葡萄牙、🇬🇷希腊、🇲🇹马耳他、🇨🇾塞浦路斯、🇭🇺匈牙利、🇱🇻拉脱维亚等）。客户可同时配置多个欧洲国家身份，实现"组合策略"效果：\n\n- 一个国家的居留卡+另一个国家的黄金签证\n- 低居住要求的投资居留+适合实际居住的高福利国家\n- 快速永居路径+可选入籍路径\n- 申根区通行覆盖+各自税务居民管理\n\n⚠️ **重要政策变动提醒**：\n- ❌ 西班牙黄金签证已于2025年4月3日正式关闭\n- ⚠️ 葡萄牙入籍从5年→10年（2026年5月新法颁布，待公报后生效；永居仍为5年）\n- ⚠️ 爱尔兰IIP已于2023年2月关闭\n- ⚠️ 希腊黄金签证2024年9月起涨价（分€25万/€40万/€80万三区）\n\n---\n\n## 摘要结论\n\n本方案为客户提供**欧洲组合策略**身份规划：\n\n**主推荐路径——葡萄牙·基金投资居留（D9/ARI黄金签证）**：投资€50万于合规风险投资基金，低居住要求（平均7天/年），5年可申请永居，申根区自由通行。是当前欧洲最稳定、性价比最高的投资居留路径之一。\n\n**备选/并行路径**：\n- 🇬🇷 **希腊黄金签证**：€25万-80万购房永居，无居住要求，直接5年永居卡\n- 🇲🇹 **马耳他MPRP永居**：租房€14,000/年+政府捐赠€37,000起，申根永居\n- 🇨🇾 **塞浦路斯永居**：€30万购房直接PR，无居住要求\n- 🇭🇺 **匈牙利客座投资者**：€25万基金投资，10年居留\n- 🇱🇻 **拉脱维亚黄金签证**：€5万起（欧盟最低门槛）\n\n**组合策略核心**：可同时持有多个欧洲国家居留/永居身份，最大化申根通行、税务规划、教育选择、居住灵活性。\n\n## 一、客户家庭基本信息（待补充版）\n\n### 1.1 已知/默认信息\n\n| 项目 | 当前信息 | 状态 |\n|---|---|---|\n| 客户身份 | 中国籍家庭/企业主/高净值客户 | ⚠️ 待确认 |\n| 核心目标 | 欧盟居留/永居/入籍、申根自由通行、子女教育、资产配置、税务规划 | ⚠️ 待确认 |\n| 预算范围 | 视国家：葡萄牙ARI €50万、希腊€25-80万、马耳他约€15-20万总计、塞浦路斯€30万、匈牙利€25万 | ✅ 已知政策门槛 |\n| 家庭成员 | 主申+配偶+子女+双方父母（各国随行政策不同） | ⚠️ 待确认 |\n| 是否计划居住欧洲 | 影响国家选择：葡萄牙仅需7天/年 vs 西班牙NLV需183天/年 | ⚠️ 待确认 |\n| 是否计划工作 | 希腊GV不可工作；葡萄牙/Malta可工作 | ⚠️ 待确认 |\n| 子女教育需求 | 欧洲公立/国际学校/IB/A-Level/华侨生联考 | ⚠️ 待确认 |\n| 资金来源 | 投资款+律师费+税费须合规出境 | ❌ 待确认 |\n| 税务居民身份 | 中国税务居民为默认假设；取得欧洲居留后可能触发该国税务居民 | ⚠️ 待确认 |\n\n### 1.2 待解决问题分级\n\n| 编号 | 问题 | 严重度 | 说明 |\n|---|---|---|---|\n| Q1 | 欧洲目标国家选定 | P0 | 不同国家投资额/居住/工作/入籍差异巨大 |\n| Q2 | 是否组合策略（多国并行） | P1 | 组合策略可最大化身份灵活性，但成本增加 |\n| Q3 | 居住意愿（低/中/高） | P0 | 直接决定选葡萄牙(7天)还是某国(183天) |\n| Q4 | 入籍目标 | P1 | 葡萄牙新法10年入籍；马耳他需居住；塞浦路斯8年 |\n| Q5 | 资金出境合规 | P0 | 投资€25万-50万+需走合规通道 |\n| Q6 | 税务居民风险 | P1 | 各国183天规则触发不同；葡萄牙NHR已收紧 |\n| Q7 | 子女年龄窗口 | P1 | 各国随行子女年龄上限不同（18/21/24岁） |\n| Q8 | 语言要求 | P2 | 永居/入籍均有语言测试 |\n| Q9 | 房产vs基金 | P2 | 葡萄牙房产路径已关闭；希腊涨价影响大 |\n\n### 1.3 根本判断\n\n**表面问题**：客户想要一个欧洲身份。\n\n**真实问题**：客户需要根据居住意愿、投资预算、入籍目标、工作需求、子女教育需求，在欧洲多国中选择最优的单一/组合方案。对于中国高净值家庭，通常推荐"低居住要求+高身份价值"的组合：葡萄牙D9/ARI（主路径）+希腊黄金签证（备选/并行）+马耳他MPRP（申根永居备用）。\n\n---\n\n## 二、核心策略\n\n### 2.1 六国选择矩阵\n\n| 维度 | 🇵🇹葡萄牙 | 🇬🇷希腊 | 🇲🇹马耳他 | 🇨🇾塞浦路斯 | 🇭🇺匈牙利 | 🇱🇻拉脱维亚 |\n|---|---|---|---|---|---|---|\n| 类型 | 投资居留→永居 | 投资永居 | 投资永居 | 投资永居 | 投资居留 | 投资居留 |\n| 最低投资 | €200K(捐赠)/€500K(基金) | €250K(改造)/€400K-800K | €14K/年租赁+捐赠 | €300K购房 | €250K基金 | €50K商业 |\n| 居住要求 | 7天/年 | 无 | 无 | 无 | 转永居需居住 | 无 |\n| 能否工作 | ✅ | ❌ | ✅ | ❌ | 有限制 | 有限制 |\n| 永居 | 5年 | 直接5年卡 | 直接永居卡 | 直接PR | 3年 | 5年 |\n| 入籍 | 10年(新法) | 7年(实际居住) | 需居住+审查 | 8年 | 8年 | 10年 |\n| 申根 | ✅ | ✅ | ✅ | ❌(进行中) | ✅ | ✅ |\n| 随行子女上限 | 18岁 | 21岁 | 无年龄(经济依赖) | 25岁(25岁后失效) | 18岁 | 18岁 |\n| 福利 | ★★★★ | ★★★ | ★★★ | ★★★ | ★★★ | ★★ |\n\n### 2.2 组合策略推荐\n\n#### 策略一：低居住组合（预算€50-70万）\n\n```text\n葡萄牙D9/ARI（基金€50万）← 主路径\n        +\n希腊黄金签证（€25万改造房）← 并行备选\n    效果\n· 葡萄牙5年永居+10年入籍（申根区+葡语国家）\n· 希腊直接5年永居卡（申根区）\n· 双重申根居留，出行和居住最大灵活性\n· 葡萄牙低居住(7天/年)+希腊无居住要求\n```\n\n#### 策略二：快速永居组合（预算€30-50万）\n\n```text\n希腊黄金签证（€25万改造房）← 主路径\n        +\n塞浦路斯永居（€30万购房）← 并行\n    效果\n· 希腊申根永居卡\n· 塞浦路斯欧盟永居（非申根，但欧盟）\n· 双永居，几乎无居住要求\n· 适合不想等待5年、想要直接永居的客户\n```\n\n#### 策略三：高预算全面组合（预算€100万+）\n\n```text\n葡萄牙D9/ARI（基金€50万）← 核心\n        +\n希腊黄金签证（€40-80万）← 申根双保险\n        +\n马耳他MPRP（€15-20万）← 英语国家+税收友好\n    效果\n· 三个欧盟身份同时配置\n· 葡萄牙路径通向入籍\n· 马耳他英语环境+无资本利得/遗产税\n· 希腊最大申根区覆盖\n```\n\n### 2.3 ⚠️ 不推荐的路径\n\n| 国家/项目 | 原因 |\n|---|---|\n| ❌ 西班牙黄金签证 | 2025年4月3日正式关闭 |\n| ❌ 西班牙NLV非盈利 | 需居住≥183天/年+禁止工作+严格收入要求 |\n| ❌ 爱尔兰IIP | 2023年2月关闭 |\n| ❌ 葡萄牙房产投资 | 2025年4月起房产路径不再接受 |\n| ⚠️ 马耳他MEIN入籍 | 费用极高(€60-75万+)+年度限额400人 |\n\n---\n\n## 三、合规清理详细方案\n\n### 3.1 各国资金来源合规要求\n\n| 国家 | 审查严格度 | 要求 | 特别注意 |\n|---|---|---|---|\n| 葡萄牙 | ★★★★ | 资金来源说明+反洗钱审查+银行KYC | 基金认购需证明资金合法来源 |\n| 希腊 | ★★★ | 购房资金合法来源+银行转账 | 购房款须从境外账户转入希腊 |\n| 马耳他 | ★★★★★ | 总资产≥€500K(€150K金融资产)+合法来源 | 全球资产申报+反洗钱严格 |\n| 塞浦路斯 | ★★★ | 年收入≥€50K+来源合法 | 境外收入证明 |\n| 匈牙利 | ★★★ | 基金投资合法来源 | 央行审批基金 |\n| 拉脱维亚 | ★★ | 投资合法来源 | 门槛最低但审查相对宽松 |\n\n### 3.2 中国国籍边界（各国通用）\n\n**欧洲居留/永居不等同于改变国籍。取得欧洲居留后，中国出入境仍使用中国护照。取得欧洲国籍后（如通过入籍），严禁将欧洲护照用于中国出入境。**\n\n| 身份状态 | 中国出入境 | 中国境内身份使用 |\n|---|---|---|\n| 欧洲临时/永久居留 | 中国护照 | 中国身份证/户口本 |\n| 欧洲国籍（入籍后） | 中国护照（严禁欧洲护照） | 中国身份证/户口本（入籍后自动丧失中国国籍） |\n\n### 3.3 各国反洗钱与审查要点\n\n| 国家 | 关键反洗钱要求 |\n|---|---|\n| 葡萄牙 | SEF/AIMA审查资金来源；银行KYC+反洗钱声明；基金需CMVM监管 |\n| 希腊 | 购房合同须明确声明资金来源；银行转账路径清晰 |\n| 马耳他 | 最严格：须提供全球资产清单、银行推荐信、税务申报记录 |\n| 塞浦路斯 | 银行审查资金来源；需境外收入≥€50K/年 |\n| 匈牙利 | 基金投资需通过匈牙利央行(MNB)监管审查 |\n| 拉脱维亚 | 商业投资需公司审计报告+年纳税证明 |\n\n---\n\n## 四、境外资金归集与投资架构\n\n### 4.1 推荐资金路径\n\n| 路径 | 适用 | 优点 | 缺点 | 适合金额 |\n|---|---|---|---|---|\n| 境外已有资产 | 已有香港/新加坡/迪拜/瑞士资产 | 最快、最合规 | 需历史来源说明 | €50万+ |\n| ODI商业投资 | 有企业客户 | 大额合规 | 2-4月审批 | €50万+ |\n| 境外上市变现 | 上市企业主 | 金额大、来源清晰 | 需符合外汇管规 | €50万+ |\n| 组合路径 | 境外存量+ODI+合规换汇 | 灵活 | 需统一规划 | 按需 |\n| 地下钱庄 | — | — | P0红区 | — |\n\n### 4.2 各国资金预算框架\n\n| 国家 | 最低投资额 | 汇率(RMB/外币) | 折合RMB | 备注 |\n|---|---:|---:|---:|---|\n| 葡萄牙D9基金 | €500,000 | 7.80 | ¥390万 | 基金持有约7年 |\n| 葡萄牙捐赠 | €200,000 | 7.80 | ¥156万 | 文化/艺术捐款 |\n| 希腊核心区 | €800,000 | 7.80 | ¥624万 | 雅典/萨洛尼卡等 |\n| 希腊非核心区 | €400,000 | 7.80 | ¥312万 | 其他地区 |\n| 希腊改造房 | €250,000 | 7.80 | ¥195万 | 商业转住宅 |\n| 马耳他MPRP购房 | €375K+€97K政府费 | 7.80 | ¥368万+ | 购房路径 |\n| 马耳他MPRP租房 | 年€14K+政府费€37K起 | 7.80 | ¥40万+ | 租房路径 |\n| 塞浦路斯PR | €300,000 | 7.80 | ¥234万 | 购房直接PR |\n| 匈牙利基金 | €250,000 | 7.80 | ¥195万 | 基金投资 |\n\n---\n\n## 五、投资使用建议\n\n### 5.1 葡萄牙——基金投资居留(D9/ARI)详解\n\n| 维度 | 内容 |\n|---|---|\n| 法律依据 | 葡萄牙《外国人法》第90-A条（ARI黄金签证） |\n| 政策状态 | ✅ 仍在运行；房产路径已关闭(2025.4)；基金路径是当前主流 |\n| 投资金额 | €500,000 |\n| 基金监管 | 须为葡萄牙证监会(CMVM)监管的合规风险投资基金 |\n| 持有期 | 至少持有至首次续签（约7年） |\n| 首次居留卡 | 2年 |\n| 续签 | 3年 |\n| 居住要求 | 平均7天/年（第一年≥7天，后续每两年≥14天） |\n| 转永居 | 合法居住5年+葡语A2 |\n| ⚠️ 入籍 | 2026年新法：10年（非EU公民）；5年→10年 |\n| 可否工作 | ✅ 可自由在葡工作/创业 |\n| 申根 | ✅ 全区免签通行 |\n| 家庭 | 配偶+18岁以下子女+经济依赖父母 |\n| 退出 | 约7年后可赎回基金 |\n\n### 5.2 希腊——黄金签证详解\n\n| 维度 | 内容 |\n|---|---|\n| 法律依据 | 希腊《移民与社会融合法》第4251/2014号及后续修订 |\n| 政策变动 | ⚠️ 2024年9月起执行新价格分层 |\n| Zone A (€800,000) | 雅典(Attica)、塞萨洛尼基、米科诺斯、圣托里尼及人口>3,100岛屿 |\n| Zone B (€400,000) | 希腊其他所有地区 |\n| Zone C (€250,000) | 购买需翻修的房产或商业→住宅改造项目 |\n| 其他投资方式 | €400K资本投资、€500K政府债券、€500K银行存款 |\n| 身份类型 | 直接获得5年永居卡 |\n| 居住要求 | 无最低居住要求 |\n| 续签 | 每5年续签，仅需维持投资 |\n| 续转永居 | GV本身就是5年可续永居卡 |\n| 入籍 | 实际居住≥7年(年≥183天)+希语B1+文化考试 |\n| ⚠️ 工作限制 | 不可在希腊受雇工作（仅可任自己公司无薪董事） |\n| ⚠️ 短租禁止 | GV房产不得用于Airbnb等短租 |\n| 家庭 | 配偶+21岁以下子女+双方父母 |\n\n### 5.3 马耳他——MPRP永居详解\n\n| 维度 | 内容 |\n|---|---|\n| 法律依据 | 马耳他永居计划(Malta Permanent Residence Programme) |\n| 政策状态 | ✅ 2021年启动，多次修订(LN57/2024, LN310/2024, LN146/2025) |\n| 购房路径 | ≥€375,000房产+€60K行政费+€37K捐赠+€2K慈善 |\n| 租房路径 | 年租金≥€14,000(≥5年)+€60K行政费+€59K捐赠+€2K慈善 |\n| 资产证明 | 总资产≥€500,000（其中≥€150,000为金融资产） |\n| 身份类型 | 直接永久居留 |\n| 永居卡 | 5年有效期，可续 |\n| 居住要求 | 无最低要求 |\n| 投资维持 | 至少5年；之后须保留马耳他住址 |\n| 可否工作 | ✅ 可在马耳他工作 |\n| 申根 | ✅ 全区通行 |\n| 税务 | 非境内收入不征税；无资本利得税/遗产税 |\n| 审批时间 | 约12-18个月 |\n\n### 5.4 塞浦路斯——永居计划(Golden Visa/PR)\n\n| 维度 | 内容 |\n|---|---|\n| 投资额 | ≥€300,000（房产/基金/公司股份） |\n| 年收入要求 | 主申境外年收入≥€50,000；配偶+€15,000；每子女+€10,000 |\n| 身份类型 | 直接永久居留 |\n| 居住要求 | 无硬性要求（入籍需实际居住） |\n| 审批 | 约9个月（含尽调） |\n| 入籍 | 实际居住8年 |\n| ⚠️ 工作限制 | 不可在塞浦路斯受雇工作 |\n| 申根 | ❌ 非申根区（准入进行中） |\n| 优势 | 直接PR、英语普及、英式法律体系 |\n\n### 5.5 匈牙利——客座投资者计划(GIP)\n\n| 维度 | 内容 |\n|---|---|\n| 启动 | 2024年1月1日 |\n| 基金投资 | ≥€250,000于MNB批准的匈牙利房地产基金 |\n| ⚠️ 购房已取消 | 2025年1月15日起€500K直接购房路径已取消 |\n| 居留许可 | 10年，可续10年 |\n| 转永居 | 在匈实际居住3年 |\n| 入籍 | 连续居住8年+匈牙利语考试 |\n| 申根 | ✅ |\n\n### 5.6 拉脱维亚——黄金签证（欧盟最低门槛）\n\n| 维度 | 内容 |\n|---|---|\n| 商业投资 | ≥€50,000入股拉脱维亚公司（政府费€10,000） |\n| 房地产 | ≥€250,000（政府费5%） |\n| 居留卡 | 5年临时居留 |\n| 居住要求 | 无最低要求（仅需每年报到） |\n| 永居 | 5年 |\n| 入籍 | 10年+拉脱维亚语A2+入籍考试 |\n| 申根 | ✅ |\n\n### 5.7 不建议做法\n\n- 不建议将欧洲房产作为主要投资增值工具（主要目的应为身份）。\n- 不建议在非核心区购买非品牌开发商项目（退出风险大）。\n- 不建议忽视各国税务居民触发条件（183天规则因国而异）。\n- 不建议将欧洲身份作为"避税"工具（各国CRS参与度不同但覆盖广）。\n- 不建议在葡萄牙购买房产（该路径已关闭）。\n\n---\n\n## 六、财富架构搭建方案\n\n### 6.1 推荐组合架构\n\n```text\n中国事业主体/家庭资产\n        ↓\n香港/新加坡控股平台（财富管理中心）\n        ↓\n┌──────────────────────────────────────────┐\n│ 欧洲身份层                                │\n│ · 葡萄牙居留→永居· 申根通行               │\n│ · 希腊永居· 申根双保险                    │\n│ · 马耳他永居· 英语+税务友好               │\n└──────────────────────────────────────────┘\n        ↓\n欧洲资产配置（可选）\n· 葡萄牙基金投资\n· 希腊房产\n· 马耳他债券/资产\n        ↓\n全球资产组合（多中心管理）\n```\n\n### 6.2 各国税务对财富管理的优势\n\n| 国家 | 独特优势 | 适合管理的资产类型 |\n|---|---|---|\n| 马耳他 | 非境内收入不征税、无资本利得/遗产税、英语法系 | 境外控股公司、知识产权 |\n| 塞浦路斯 | 非税务居民境外收入免税、12.5%公司税（欧盟最低之一） | 欧盟运营总部 |\n| 葡萄牙 | NHR税收优惠（已收紧但仍有适用场景） | 基金投资 |\n| 希腊 | 非税务居民仅就境内收入征税 | 房产资产管理 |\n| 匈牙利 | 9%公司税（欧盟最低） | 生产/分销基地 |\n\n### 6.3 不建议架构\n\n- 不建议将全部境外资产集中在单一欧洲国家。\n- 不建议以欧洲公司承接中国主营业务利润而无实质商业安排。\n- 不建议忽视中国CFC规则和境外所得税务申报义务。\n- 不建议进行复杂的多层架构而没有实质商业目的（可能触发反避税）。\n\n---\n\n## 七、税务分析\n\n### 7.1 各国税务居民触发条件\n\n| 国家 | 税务居民触发 | 税率 | 境外收入 |\n|---|---|---|---|\n| 葡萄牙 | 居住≥183天/年 | 14.5%-48%累进 | 税务居民全球征税 |\n| 希腊 | 居住≥183天/年 | 9%-44%累进 | 税务居民全球征税 |\n| 马耳他 | 居住≥183天/年或"惯常居所" | 0%-35%累进 | 仅境内收入+汇入境外收入 |\n| 塞浦路斯 | 居住≥183天/年(或60天规则) | 0%-35%累进 | 非税务居民仅境内收入 |\n| 匈牙利 | 居住≥183天/年或"重要利益中心" | 15%统一税率 | 税务居民全球征税 |\n| 拉脱维亚 | 居住≥183天/年 | 20%-31%累进 | 非税务居民仅境内收入 |\n\n### 7.2 低居住客户税务策略\n\n对于选择"低居住要求"路径的客户（葡萄牙7天/年、希腊0天、马耳他0天），通常不会触发目标国税务居民身份，仍保持中国税务居民状态。\n\n| 税务风险点 | 应对策略 |\n|---|---|\n| 中国税务居民全球征税 | 境外资产和收入须在中国申报 |\n| CRS信息交换 | 欧洲银行账户信息自动交换至中国 |\n| 183天规则 | 各国独立计算，多国分时段居住可避免任何一国超183天 |\n| 投资所得税收 | 各国对分红/利息/租金可能代扣税，关注税收协定 |\n| 遗产税 | 葡萄牙无遗产税（配偶/直系后代）、马耳他无、希腊分税率 |\n\n### 7.3 各国重要税务特点\n\n| 国家 | 个税 | 公司税 | 资本利得 | 遗产/赠与税 | VAT |\n|---|---|---|---|---|---|\n| 葡萄牙 | 14.5%-48% | 21% | 15.4% | 配偶/直系免 | 23% |\n| 希腊 | 9%-44% | 22% | 15% | 1%-20% | 24% |\n| 马耳他 | 0%-35% | 35% | 一般免 | 无(马耳他) | 18% |\n| 塞浦路斯 | 0%-35% | 12.5% | 20% | 无 | 19% |\n| 匈牙利 | 15%统一 | 9% | 15% | 18% | 27% |\n| 拉脱维亚 | 20%-31% | 20% | 20% | 分税率 | 21% |\n\n---\n\n## 八、资金跨境合规方案\n\n### 8.1 推荐执行路径\n\n| 阶段 | 动作 | 周期 |\n|---|---|---|\n| 第1阶段 | 客户资产全面体检+欧洲各国预算匹配 | 1-2周 |\n| 第2阶段 | 确定主+备选国家，计算总投资需求 | 1周 |\n| 第3阶段 | 确认资金出境：境外存量/ODI/组合 | 1-4周 |\n| 第4阶段 | 开立目标国银行账户 | 1-4周 |\n| 第5阶段 | 资金转入目标国并完成投资 | 1-3月 |\n| 第6阶段 | 委托各国持牌律师递交申请 | 申请月 |\n\n### 8.2 组合策略资金调度表\n\n| 国家 | 投资金额 | 律师费 | 政府费 | 总资金需求 | 资金到位节点 |\n|---|---|---|---|---|---|\n| 葡萄牙基金 | €500,000 | €8,000-12,000 | €5,000 | €517,000 | 基金认购时 |\n| 希腊改造房 | €250,000 | €5,000-8,000 | €3,500 | €261,500 | 购房合同签订时 |\n| 马耳他MPRP(租房) | — | €8,000-12,000 | €100,000起 | €108,000 | 分阶段付款 |\n| 合计(三选组合) | | | | €369K-625K | |\n\n### 8.3 严禁路径\n\n- 地下钱庄/虚拟货币换汇。\n- 现金搬运出入境。\n- 虚假贸易背景。\n- 第三方代付无法解释。\n- 多人拆分购汇后归集。\n\n---\n\n## 九、身份路径规划\n\n### 9.1 葡萄牙——主推荐路径深度解析\n\n| 阶段 | 时间 | 状态 | 要求 |\n|---|---|---|---|\n| 基金认购完成 | T+0 | 投资完成 | €500K基金认购协议+付款 |\n| AIMA在线申请 | T+1-2月 | 提交申请 | 材料+基金确认 |\n| 居留卡批准 | T+6-12月 | 首次2年居留卡 | 录指纹+审批 |\n| 首次续签 | T+2年 | 续签3年 | 维持投资+居住≥14天/2年 |\n| 永居申请 | T+5年 | 永久居留 | 葡语A2+居住满足 |\n| ⚠️ 入籍申请 | T+10年 | 葡萄牙护照 | 葡语A2+入籍考试（新法） |\n| 基金退出 | T+约7年 | 赎回基金 | 永居获批后可退出 |\n\n⚠️ 葡萄牙入籍新法（2026年5月3日颁布，待公报生效）：非EU/CPLP公民从5年延长至10年。但永居仍为5年不变。\n\n### 9.2 希腊——快速永居路径\n\n| 阶段 | 时间 | 状态 |\n|---|---|---|\n| 购房完成 | T+0 | 投资完成 |\n| 提交申请 | T+1-2月 | 蓝纸(临时居留证明) |\n| 永居卡 | T+3-6月 | 5年永居卡 |\n| 续签 | T+5年 | 再续5年（仅需维持投资） |\n| 入籍 | 实际居住≥7年 | 需全日制居住+希语B1 |\n\n### 9.3 马耳他——申根永居路径\n\n| 阶段 | 时间 | 状态 |\n|---|---|---|\n| 提交申请+行政费 | T+0 | 申请受理 |\n| 审批 | T+12-18月 | 原则批准 |\n| 完成投资 | 获批后 | 支付捐款+购房/租房 |\n| 永居卡 | T+18月 | 5年永居卡 |\n| 续签 | 每5年 | 维持地址即可 |\n\n### 9.4 塞浦路斯——直接PR路径\n\n| 阶段 | 时间 | 状态 |\n|---|---|---|\n| 购房完成 | T+0 | 投资完成 |\n| 提交申请 | T+1-2月 | 受理 |\n| PR获批 | T+6-9月 | 永久居留卡 |\n| 入籍 | 居住8年 | 塞浦路斯护照 |\n\n### 9.5 组合路径时间线\n\n```text\n月份 1-3:  确认组合方案+资金准备+材料收集\n月份 3-6:  葡萄牙ARI申请+希腊购房+马耳他审批启动\n月份 6-9:  葡萄牙居留卡获批+希腊永居卡获批\n月份 9-18: 马耳他MPRP原则批准+完成投资\n月份 18:   三国居留/永居全部到位\n      ↓\n第5年:  葡萄牙永居申请+希腊续签\n第8年:  塞浦路斯入籍（如选择）\n第10年: 葡萄牙入籍申请（新法）\n```\n\n---\n\n## 十、教育规划\n\n### 10.1 欧洲教育价值\n\n| 教育路径 | 适合国家 | 特点 |\n|---|---|---|\n| 公立教育 | 葡萄牙/希腊/马耳他 | 免费（当地语言教学）；葡萄牙英语普及度中等、马耳他英语至高中 |\n| 国际学校 | 所有国家 | IB/A-Level/美式课程；€6,000-18,000/年 |\n| 欧盟本地生学费 | 所有欧盟国家 | 入籍后享受欧盟公民本地学费(€2,000-5,000/年 vs 国际生€15,000-40,000) |\n| 华侨生联考 | 持欧洲永居(华侨身份) | 需在目标国居住≥18个月(报考前2年内) |\n\n### 10.2 各国国际学校概览\n\n| 国家 | 年费范围 | 代表学校 | 特点 |\n|---|---|---|---|\n| 葡萄牙 | €6,000-18,000 | Carlucci American, St Julian's, Oeiras International | IB/美式/英式 |\n| 希腊 | €7,000-13,000 | ACS Athens, Campion, St Catherine's | IB/英式 |\n| 马耳他 | €6,000-10,000 | Verdala, St Edward's, QSI | 英语教学全体系 |\n| 塞浦路斯 | €5,000-10,000 | English School, American Academy | 英语普及率高 |\n\n### 10.3 各国随行子女年龄限制\n\n| 国家 | 首次随行上限 | 续签后上限 | 注意 |\n|---|---|---|---|\n| 葡萄牙 | 18岁 | 18岁(续签时仍在校可延至24岁) | 关键节点 |\n| 希腊 | 21岁 | 21岁(可续3年) | 21岁后需独立申请 |\n| 马耳他 | 无年龄(需经济依赖+未婚) | 同 | 最友好 |\n| 塞浦路斯 | 18岁(25岁前可随行) | 25岁失效 | 25岁后需独立 |\n\n---\n\n## 十一、福利居住国规划\n\n### 11.1 各国生活比较\n\n| 维度 | 葡萄牙 | 希腊 | 马耳他 | 塞浦路斯 |\n|---|---|---|---|---|\n| 生活成本(月/人) | €800-1,500 | €700-1,200 | €900-1,600 | €800-1,400 |\n| 医疗 | 公立SNS | 公立IKA | 公立Mater Dei | 公立GESY |\n| 安全 | ★★★★★ | ★★★★ | ★★★★★ | ★★★★★ |\n| 英语普及 | ★★★ | ★★ | ★★★★★ | ★★★★ |\n| 气候 | 地中海 | 地中海 | 地中海 | 地中海 |\n| 交通(去中国) | 需转机 | 需转机 | 需转机 | 需转机 |\n| 华人社区 | 里斯本/波尔图 | 雅典 | 瓦莱塔周边 | 利马索尔 |\n\n### 11.2 推荐居住国定位\n\n| 客户类型 | 推荐居住国 | 原因 |\n|---|---|---|\n| 仅需低居住 | 葡萄牙(7天/年) | 身份价值最高的最低居住方案 |\n| 英语环境优先 | 马耳他 | 英语母语环境、英式教育/法律体系 |\n| 气候+低成本 | 希腊 | 地中海气候、相对低房价 |\n| 欧盟商务中心 | 葡萄牙 | 科技/创业生态好、Web Summit |\n| 退休/养老 | 希腊/塞浦路斯 | 慢节奏生活、自然风光 |\n\n---\n\n## 十二、预算明细汇总\n\n### 12.1 葡萄牙D9基金——费用明细\n\n> 汇率 1 EUR = 7.80 RMB（暂不计欧元汇率升值风险）\n\n| 序号 | 费用项目 | 金额(EUR) | 折合RMB(万元) | 付款节点 |\n|---|---|---|---|---|\n| 1 | 基金认购 | €500,000 | 390.00 | 签约完成后 |\n| 2 | 律师费 | €8,000-12,000 | 6.24-9.36 | 签约后 |\n| 3 | 政府申请费 | €5,000起 | 3.90 | 提交申请时 |\n| 4 | 居留卡费(主申+配偶+2子女) | 约€4,000 | 3.12 | 获批后 |\n| 5 | 国内公证/翻译/双认证 | 约€1,500 | 1.17 | 材料阶段 |\n| 6 | 葡萄牙NIF税号 | 免费 | 0 | 律师代办 |\n| 7 | 葡萄牙银行开户 | 免费 | 0 | 律师代办 |\n| 8 | 健康保险(四人年) | 约€1,200 | 0.94 | 每年 |\n| 9 | 葡语A2考试费 | 约€120/人 | 0.09/人 | 永居/入籍时 |\n| 10 | 续签律师+政府费 | 约€4,000/次 | 3.12/次 | 第2、5年 |\n| **一次性费用合计** | **€519,700-523,700** | **约405.36-408.48** | |\n\n### 12.2 希腊黄金签证——费用明细\n\n| 序号 | 费用项目 | 金额(EUR) | 折合RMB(万元) | 付款节点 |\n|---|---|---|---|---|\n| 1 | 购房投资(改造房) | €250,000 | 195.00 | 购房时 |\n| 2 | 房产转让税+律师 | 约3%+2%=€12,500 | 9.75 | 购房时 |\n| 3 | 政府申请费(主申) | €2,000 | 1.56 | 申请时 |\n| 4 | 政府申请费(配偶+2子女) | €4,200 | 3.28 | 申请时 |\n| 5 | 律师服务费 | €5,000-8,000 | 3.90-6.24 | 签约后 |\n| 6 | 国内公证/翻译 | €1,000 | 0.78 | 材料阶段 |\n| 7 | 永居卡费(四人) | €1,000 | 0.78 | 获批后 |\n| 8 | 健康保险(四人年) | €1,000 | 0.78 | 每年 |\n| 9 | 续签费(每5年) | €500/人 | 0.39/人 | 每5年 |\n| **一次性费用合计** | **€276,700-279,700** | **约215.83-218.12** | |\n\n### 12.3 马耳他MPRP租房路径——费用明细\n\n| 序号 | 费用项目 | 金额(EUR) | 折合RMB(万元) | 付款节点 |\n|---|---|---|---|---|\n| 1 | 政府行政费(申请时) | €15,000 | 11.70 | 申请时 |\n| 2 | 政府行政费(获批后) | €45,000 | 35.10 | 获批后 |\n| 3 | 政府捐赠(租房路径) | €59,000 | 46.02 | 获批后 |\n| 4 | 慈善捐赠 | €2,000 | 1.56 | 获批后 |\n| 5 | 租房(5年×€14,000) | €70,000 | 54.60 | 分年 |\n| 6 | 律师服务费 | €8,000-12,000 | 6.24-9.36 | 签约后 |\n| 7 | 尽调费(主申) | €15,000 | 11.70 | 申请时 |\n| 8 | 尽调费(附加申请人) | €10,000/人 | 7.80/人 | 申请时 |\n| 9 | 国内公证/翻译 | €1,500 | 1.17 | 材料阶段 |\n| 10 | 马耳他保险 | €500/年 | 0.39/年 | 每年 |\n\n> 四人家庭租房路径总费用（5年）：约€210,000-215,000 → 折合约**163.80-167.70万元**\n\n### 12.4 组合方案总费用汇总\n\n| 组合方案 | 投资款(RMB万) | 费用支出(RMB万) | 总支出(RMB万) | 获得身份 |\n|---|---|---|---|---|\n| 葡萄牙D9(单国) | 390.00 | 约15-18 | 约405-408 | 5年永居、10年入籍 |\n| 希腊GV(单国) | 195.00 | 约20-23 | 约215-218 | 直接永居卡 |\n| 马耳他MPRP(单国租房) | 0 | 约164-168 | 约164-168 | 直接永居卡 |\n| 组合A：葡+希 | 585.00 | 约35-41 | 约620-626 | 双国居留+永居 |\n| 组合B：希+马 | 195.00 | 约184-191 | 约379-386 | 双申根永居 |\n| 组合C：葡+希+马 | 585.00 | 约200-210 | 约785-795 | 三国申根身份 |\n\n### 12.5 材料清单（跨国通用）\n\n| 序号 | 文件 | 葡萄牙 | 希腊 | 马耳他 | 塞浦路斯 | 匈牙利 |\n|---|---|---|---|---|---|---|\n| 1 | 护照(≥6月有效期) | ✅ | ✅ | ✅ | ✅ | ✅ |\n| 2 | 照片(35×45mm) | ✅ | ✅ | ✅ | ✅ | ✅ |\n| 3 | 出生公证(双认证) | ✅ | ✅ | ✅ | ✅ | ✅ |\n| 4 | 结婚证公证(双认证) | ✅ | ✅ | ✅ | ✅ | ✅ |\n| 5 | 无犯罪记录(6月内) | ✅ | ✅ | ✅ | ✅ | ✅ |\n| 6 | 健康保险 | ✅ | ✅ | ✅ | ✅ | ✅ |\n| 7 | 护照尺寸户口本 | 翻译 | 翻译 | 翻译 | 翻译 | 翻译 |\n| 8 | 投资证明 | 基金认购 | 购房合同 | 租房合同 | 购房合同 | 基金认购 |\n| 9 | 资金来源说明 | ✅ | ✅ | ✅ | ✅ | ✅ |\n| 10 | 体检报告 | 部分 | 部分 | ✅ | ✅ | 部分 |\n| 11 | 收入证明/银行流水 | ✅ | 部分 | ✅ | ✅ | ✅ |\n| 12 | 语言证明 | — | — | — | — | — |\n| 13 | NIF税号(葡)/AFM税号(希) | ✅ | ✅ | — | — | — |\n\n### 12.6 三方材料清单\n\n| 责任方 | 材料/文件 | 用途 |\n|---|---|---|\n| 客户 | 全部身份+家庭关系+无犯罪+体检+收入资金证明 | 各国申请基础 |\n| 葡萄牙律师 | 基金核查+ARI申请+居留/永居申请 | 葡萄牙身份 |\n| 希腊律师 | 购房法律审查+黄金签证申请+永居卡办理 | 希腊身份 |\n| 马耳他授权代理 | MPRP申请+政府沟通+永居卡办理 | 马耳他身份 |\n| 塞浦路斯律师 | 购房法律审查+PR申请 | 塞浦路斯身份 |\n| 公证/翻译/双认证机构 | 公证书+翻译件+海牙认证/双认证 | 材料合规 |\n| 各国银行 | 投资账户、付款凭证 | 资金链路 |\n\n---\n\n## 十三、执行时间轴\n\n### 13.1 组合策略（葡+希）并行路线图\n\n| 月份 | 葡萄牙 | 希腊 | 并行里程碑 |\n|---|---|---|---|\n| 第1月 | 确认基金+律师 | 确认房产区域+律师 | 双国方案确认 |\n| 第1-2月 | 准备材料+公证认证 | 准备材料+公证 | 材料并行准备 |\n| 第2-3月 | 开立葡银行+认购基金 | 选房+购房合同 | 双国投资并行 |\n| 第3-4月 | 提交ARI申请 | 购房完成+提交GV申请 | 双国申请提交 |\n| 第4-8月 | AIMA审批+录指纹 | — | — |\n| 第5-7月 | — | GV审批+录指纹 | — |\n| 第6-9月 | 葡萄牙居留卡 | — | 🇵🇹获批 |\n| 第7-9月 | — | 希腊永居卡 | 🇬🇷获批 |\n| 第9月 | ✅ 双国身份到位 | ✅ 双国身份到位 | 🎉 组合达标 |\n| 第5年 | 葡永居申请 | 希GV续签 | 关键节点 |\n| 第10年 | 葡入籍申请 | — | 最终目标 |\n\n### 13.2 详细办理流程图\n\n```text\n各国信息确认+方案选定（第1月）\n      ↓\n┌─────────────────────────────────────┐\n│ 并行准备（第1-3月）：               │\n│ · 葡萄牙：基金尽调+认购+ARI材料      │\n│ · 希腊：选房+购房+GV材料            │\n│ · 马耳他(如选)：MPRP材料+行政费     │\n│ · 共通：公证认证+资金来源+银行开户   │\n└─────────────────────────────────────┘\n      ↓\n┌─────────────────────────────────────┐\n│ 并行递交（第3-4月）：               │\n│ · 葡萄牙ARI在线申请                 │\n│ · 希腊GV提交                        │\n│ · 马耳他Agent递交                   │\n└─────────────────────────────────────┘\n      ↓\n审批阶段（第4-18月不等，因国而异）\n      ↓\n┌─────────────────────────────────────┐\n│ 身份到位（第9-18月）：              │\n│ · 🇵🇹葡萄牙居留卡(最快6-9月)         │\n│ · 🇬🇷希腊永居卡(5-7月)              │\n│ · 🇲🇹马耳他永居卡(12-18月)          │\n└─────────────────────────────────────┘\n      ↓\n身份维护+居住+税务管理\n      ↓\n永居/入籍（5-10年）\n```\n\n### 13.3 本周立即行动清单\n\n| 编号 | 动作 | 目的 |\n|---|---|---|\n| 1 | 确认客户居住意愿（低/中/高） | 直接影响国家选择 |\n| 2 | 确认客户预算区间（€25万/50万/100万+） | 匹配国家组合 |\n| 3 | 确认是否愿意组合策略 vs 单一国家 | 决定方案复杂度 |\n| 4 | 确认家庭成员年龄结构 | 各国随行上限不同 |\n| 5 | 确认子女教育方向 | DSE/IB/本地学校 |\n| 6 | 联系各国持牌律师获取最新政策报价 | 落地线 |\n| 7 | 确认资金出境路径 | P0合规 |\n\n---\n\n## 十四、重要风险声明\n\n### 14.1 政策变动风险\n\n**欧洲各国移民政策持续收紧趋势明显**。西班牙黄金签证已于2025年4月关闭；葡萄牙房产路径已关闭；爱尔兰IIP已关闭；希腊GV三度涨价；葡萄牙入籍从5年延长至10年。客户获批时的政策可能已非现行政策，建议尽早锁定、快速推进。\n\n### 14.2 入籍时间延长风险\n\n**葡萄牙入籍新法（2026年5月）将非EU公民入籍时间从5年延长至10年**。如果客户的终极目标是葡萄牙/欧盟护照，时间表需重新计算。但永居（5年）不受影响，申根通行、居住、工作权利仍可较早获得。\n\n### 14.3 投资风险\n\n**各国投资本金均存在风险**。葡萄牙基金不保本、不保收益，锁定期约7年；希腊/塞浦路斯房产流动性有限，非核心区物业可能难以出售；马耳他捐款/行政费为不可退支出。\n\n### 14.4 税务风险\n\n**取得欧洲居留/永居不等于自动成为当地税务居民**。但如在目标国居住≥183天/年，将触发税务居民身份和全球征税义务。多国并行策略需特别注意各国税务居民的触发条件和双重税务居民风险。\n\n### 14.5 各国拒签风险\n\n**任何国家均有拒签可能**。葡萄牙基金如不合规、希腊房产不符合价格分层要求、马耳他尽调不通过、塞浦路斯收入来源不被认可等，均可能导致申请失败。\n\n### 14.6 中国国籍与出入境风险\n\n**中国不承认双重国籍**。取得欧洲国籍后，严禁使用欧洲护照在中国出入境或作为境内身份证明。取得居留/永居后，中国出入境仍使用中国护照。\n\n### 14.7 组合策略独有风险\n\n**多国并行策略虽然灵活度高，但也有独特风险**：\n- 资金分散：同一笔资金不能用于不同国家的投资，可能需要大额资金调度\n- 时间冲突：各国审批时间不同，可能延误整体时间表\n- 维护成本：每个身份都需单独维护（续签+居住+税务申报）\n- 资讯管理：多国政策变化需持续追踪\n\n### 14.8 语言与文化风险\n\n**永居/入籍均有语言要求**：葡萄牙A2葡语、希腊B1希语、马耳他英语/马耳他语、塞浦路斯希腊语、匈牙利匈牙利语。语言考试是入籍的硬门槛，不可跳过。\n\n---\n\n## 附件：引用法律法规与项目资料来源\n\n### A. 本次方案引用到的法律依据清单\n\n| 法案/规则 | 条款 | 本次用途 | 最新状态 |\n|---|---|---|---|\n| 葡萄牙《外国人法》(Lei 23/2007) | 第90-A条(ARI黄金签证) | 葡萄牙投资居留法源 | 现行(房产路径2025.4关闭) |\n| 葡萄牙《国籍法》(Lei 37/81)修订 | Decreto 48/XVII(2026.5) | 入籍年限10年 | 待公报生效 |\n| 希腊《移民与社会融合法》(4251/2014) | 第20条(黄金签证) | 希腊投资永居法源 | 2024.9修订(三区价格) |\n| 马耳他MPRP条例(LN 310/2024) | 全篇 | 马耳他永居计划 | 2024年修订版 |\n| 塞浦路斯《外籍人与移民法》(Cap. 105) | Regulation 6(2) | 塞浦路斯PR金签 | 现行有效 |\n| 匈牙利《客座投资者法案》(Act XC/2023) | 全篇 | 匈牙利GIP | 2024.1.1生效 |\n| 拉脱维亚《移民法》 | 第23条 | 拉脱维亚黄金签证 | 现行有效 |\n| 西班牙《组织法1/2025》 | — | 黄金签证已关闭 | 2025.4.3生效 |\n| 爱尔兰IIP关闭公告(2023.2.15) | — | 已关闭项目 | 2023年 |\n| 《中华人民共和国国籍法》 | 第3条、第9条 | 双重国籍禁止 | 现行有效 |\n| 葡萄牙NHR制度 | — | 税务优惠（已大幅收紧） | 2024年改革 |\n\n### B. 多个法案之间的相互影响\n\n| 组合 | 相互影响 | 需注意 |\n|---|---|---|\n| 葡萄牙居留+希腊永居 | 双申根身份可同时持有 | 税务居民判定需谨慎管理（不得同时在两国≥183天） |\n| 葡萄牙入籍+中国国籍 | 葡萄牙允许双重国籍，中国不承认 | 取得葡籍后自动丧失中国国籍，但实务中仍是"隐性状态" |\n| 各国投资+CRS | 所有欧洲国家均参与CRS | 境外账户信息会自动交换至中国 |\n| 申根区90/180天规则 | 对非申根国公民适用 | 取得申根国居留卡后，不受90/180天限制（在签发国和申根区） |\n| 葡萄牙NHR收紧+入籍延长 | NHR大幅收紧+入籍10年 | 税务和入籍两条优惠路径同时收窄 |\n| 马耳他MPRP+申根 | 马耳他永居卡=申根区自由通行 | 非申根塞浦路斯身份无法享受此 |\n\n### C. 法律适用注意事项\n\n1. **各国法律独立**：每个欧洲国家的移民法系独立运作，组合方案需要在每个国家分别满足其法律要求。\n2. **最终以持牌律师确认**：本方案所有法律依据均需由目标国持牌律师最终确认和适用。\n3. **税务需独立评估**：多国并行方案涉及复杂的国际税务居民判定，须由跨国税务师独立评估。\n4. **语言要求不可跳过**：所有国家的永居/入籍语言测试是硬性要求。\n5. **政策时效性**：2024-2026年欧洲移民政策密集调整，本方案所有信息均须在正式执行前与各国最新政策确认。\n6. **⚠️ 葡萄牙入籍**：新法10年入籍已颁布但待公报生效，已提交的程序可能不受影响，正式启动前须由葡律师确认。\n\n### D. 交付前客户需补充与确认资料\n\n1. 客户居住意愿明确（低居住/中居住/高居住）。\n2. 预算区间确认（€25-50万 / €50-100万 / €100万+）。\n3. 是否接受组合策略（多国并行）还是单一国家方案。\n4. 家庭成员年龄（各国随行子女上限不同）。\n5. 子女教育方向（当地公立/国际学校/华侨生联考）。\n6. 资金来源及出境路径说明。\n7. 是否有葡萄牙语/希腊语/英语基础（入籍语言准备）。\n8. 各国持牌律师出具的最新政策确认和报价。\n";
