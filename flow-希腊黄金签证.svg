<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" width="100%" style="max-width:720px;font-family:system-ui,sans-serif"><defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1a1a6e"/></marker></defs><rect width="720" height="280" fill="#f8f9ff" rx="14"/><text x="360" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a6e">希腊黄金签证(Golden Visa)</text><rect x="30" y="50" width="100" height="55" rx="10" fill="#fff" stroke="#1a1a6e" stroke-width="1.5"/><text x="80" y="67" text-anchor="middle" font-size="8" font-weight="600">Zone A</text><text x="80" y="83" text-anchor="middle" font-size="8" fill="#6b7280">€800K</text><line x1="132" y1="77" x2="168" y2="77" stroke="#1a1a6e" stroke-width="1.5" marker-end="url(#a)"/><rect x="170" y="50" width="100" height="55" rx="10" fill="#fff" stroke="#1a1a6e" stroke-width="1.5"/><text x="220" y="67" text-anchor="middle" font-size="8" font-weight="600">Zone B</text><text x="220" y="83" text-anchor="middle" font-size="8" fill="#6b7280">€400K</text><line x1="272" y1="77" x2="308" y2="77" stroke="#1a1a6e" stroke-width="1.5" marker-end="url(#a)"/><rect x="310" y="50" width="100" height="55" rx="10" fill="#fff" stroke="#1a1a6e" stroke-width="1.5"/><text x="360" y="67" text-anchor="middle" font-size="8" font-weight="600">Zone C</text><text x="360" y="83" text-anchor="middle" font-size="8" fill="#6b7280">€250K改造</text><line x1="412" y1="77" x2="448" y2="77" stroke="#1a1a6e" stroke-width="1.5" marker-end="url(#a)"/><rect x="450" y="50" width="140" height="55" rx="10" fill="#e8eaff" stroke="#1a1a6e" stroke-width="2"/><text x="520" y="67" text-anchor="middle" font-size="9" font-weight="600">购房→提交GV申请</text><text x="520" y="83" text-anchor="middle" font-size="8" fill="#6b7280">3-6月获批</text><line x1="592" y1="77" x2="628" y2="77" stroke="#1a1a6e" stroke-width="1.5" marker-end="url(#a)"/><rect x="630" y="50" width="70" height="55" rx="10" fill="#e8eaff" stroke="#1a1a6e" stroke-width="2"/><text x="665" y="82" text-anchor="middle" font-size="9" font-weight="600">永居</text><line x1="665" y1="107" x2="665" y2="135" stroke="#1a1a6e" stroke-width="1.5"/><line x1="665" y1="135" x2="46" y2="135" stroke="#1a1a6e" stroke-width="1.5" marker-end="url(#a)"/><rect x="50" y="110" width="180" height="50" rx="10" fill="#fff" stroke="#1a1a6e" stroke-width="1.5"/><text x="140" y="130" text-anchor="middle" font-size="10" font-weight="600">直接5年永居卡</text><text x="140" y="148" text-anchor="middle" font-size="9" fill="#6b7280">无居住要求</text><line x1="232" y1="135" x2="268" y2="135" stroke="#1a1a6e" stroke-width="1.5" marker-end="url(#a)"/><rect x="270" y="110" width="180" height="50" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="360" y="130" text-anchor="middle" font-size="10" font-weight="600">⚠️不可工作</text><text x="360" y="148" text-anchor="middle" font-size="9" fill="#78716c">不可短租Airbnb</text><line x1="452" y1="135" x2="488" y2="135" stroke="#1a1a6e" stroke-width="1.5" marker-end="url(#a)"/><rect x="490" y="110" width="180" height="50" rx="10" fill="#e8eaff" stroke="#1a1a6e" stroke-width="2"/><text x="580" y="130" text-anchor="middle" font-size="10" font-weight="700">7年入籍(实际居住)</text><text x="580" y="148" text-anchor="middle" font-size="9" fill="#6b7280">希语B1+文化考试</text></svg>
