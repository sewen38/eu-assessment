<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" width="100%" style="max-width:720px;font-family:system-ui,sans-serif"><defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1a1a6e"/></marker></defs><rect width="720" height="260" fill="#f8f9ff" rx="14"/><text x="360" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a6e">塞浦路斯永久居留(Permanent Residency)</text><rect x="50" y="50" width="150" height="55" rx="10" fill="#fff" stroke="#1a1a6e" stroke-width="1.5"/><text x="125" y="67" text-anchor="middle" font-size="9" font-weight="600">购房≥€30万</text><text x="125" y="83" text-anchor="middle" font-size="8" fill="#6b7280">年收入≥€50K</text><line x1="202" y1="77" x2="238" y2="77" stroke="#1a1a6e" stroke-width="1.5" marker-end="url(#a)"/><rect x="240" y="50" width="150" height="55" rx="10" fill="#fff" stroke="#1a1a6e" stroke-width="1.5"/><text x="315" y="67" text-anchor="middle" font-size="9" font-weight="600">提交PR申请</text><text x="315" y="83" text-anchor="middle" font-size="8" fill="#6b7280">6-9月审批</text><line x1="392" y1="77" x2="428" y2="77" stroke="#1a1a6e" stroke-width="1.5" marker-end="url(#a)"/><rect x="430" y="50" width="150" height="55" rx="10" fill="#e8eaff" stroke="#1a1a6e" stroke-width="2"/><text x="505" y="67" text-anchor="middle" font-size="9" font-weight="600">直接永久居留</text><text x="505" y="83" text-anchor="middle" font-size="8" fill="#6b7280">无居住要求</text><line x1="582" y1="77" x2="618" y2="77" stroke="#1a1a6e" stroke-width="1.5" marker-end="url(#a)"/><rect x="620" y="50" width="80" height="55" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="660" y="77" text-anchor="middle" font-size="9" font-weight="600">非申根</text><line x1="660" y1="107" x2="660" y2="135" stroke="#1a1a6e" stroke-width="1.5"/><line x1="660" y1="135" x2="46" y2="135" stroke="#1a1a6e" stroke-width="1.5" marker-end="url(#a)"/><rect x="50" y="110" width="180" height="50" rx="10" fill="#fff" stroke="#1a1a6e" stroke-width="1.5"/><text x="140" y="130" text-anchor="middle" font-size="10" font-weight="600">不可工作</text><text x="140" y="148" text-anchor="middle" font-size="9" fill="#6b7280">仅可做股东</text><line x1="232" y1="135" x2="268" y2="135" stroke="#1a1a6e" stroke-width="1.5" marker-end="url(#a)"/><rect x="270" y="110" width="180" height="50" rx="10" fill="#fff" stroke="#1a1a6e" stroke-width="1.5"/><text x="360" y="130" text-anchor="middle" font-size="10" font-weight="600">8年入籍(实际居住)</text><text x="360" y="148" text-anchor="middle" font-size="9" fill="#6b7280">希腊语考试</text><line x1="452" y1="135" x2="488" y2="135" stroke="#1a1a6e" stroke-width="1.5" marker-end="url(#a)"/><rect x="490" y="110" width="180" height="50" rx="10" fill="#e8eaff" stroke="#1a1a6e" stroke-width="2"/><text x="580" y="130" text-anchor="middle" font-size="10" font-weight="700">🇨🇾英语普及+英式法系</text><text x="580" y="148" text-anchor="middle" font-size="9" fill="#6b7280">非税务居民境外免税</text></svg>
